---
- name: Get home directory for user scope
  ansible.builtin.getent:
    database: passwd
    key: "{{ podman_quadlet_user }}"
  when: podman_quadlet_scope == 'user'

- name: Set user home directory fact
  ansible.builtin.set_fact:
    podman_quadlet_user_home: "{{ getent_passwd[podman_quadlet_user][4] }}"
  when: podman_quadlet_scope == 'user'

- name: Set expanded user path
  ansible.builtin.set_fact:
    podman_quadlet_user_path_expanded: "{{ podman_quadlet_user_home }}/.config/containers/systemd"
  when: podman_quadlet_scope == 'user'

- name: Set quadlet directory based on scope
  ansible.builtin.set_fact:
    podman_quadlet_dir: "{{ (podman_quadlet_scope == 'system') | ternary(podman_quadlet_system_path, podman_quadlet_user_path_expanded) }}"
    podman_quadlet_systemd_scope: "{{ (podman_quadlet_scope == 'system') | ternary('system', 'user') }}"

- name: Enable linger for user scope
  ansible.builtin.include_tasks:
    file: linger.yml
  when:
    - podman_quadlet_scope == 'user'
    - podman_quadlet_enable_linger

- name: Ensure quadlet directory exists
  ansible.builtin.file:
    path: "{{ podman_quadlet_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ (podman_quadlet_scope == 'user') | ternary(podman_quadlet_user, 'root') }}"
    group: "{{ (podman_quadlet_scope == 'user') | ternary(podman_quadlet_user, 'root') }}"
  become: "{{ podman_quadlet_scope == 'system' }}"

- name: Manage Podman quadlet networks
  ansible.builtin.include_tasks:
    file: networks.yml
  when: podman_quadlet_networks | length > 0
  loop: "{{ podman_quadlet_networks }}"
  loop_control:
    loop_var: network

- name: Manage Podman quadlet volumes
  ansible.builtin.include_tasks:
    file: volumes.yml
  when: podman_quadlet_volumes | length > 0
  loop: "{{ podman_quadlet_volumes }}"
  loop_control:
    loop_var: volume

- name: Manage Podman quadlet containers
  ansible.builtin.include_tasks:
    file: containers.yml
  when: podman_quadlet_containers | length > 0
  loop: "{{ podman_quadlet_containers }}"
  loop_control:
    loop_var: container

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: "{{ podman_quadlet_systemd_scope }}"
  become: "{{ podman_quadlet_scope == 'system' }}"
  become_user: "{{ (podman_quadlet_scope == 'user') | ternary(podman_quadlet_user, omit) }}"
  when: podman_quadlet_reload_daemon
